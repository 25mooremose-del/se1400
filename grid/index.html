<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Practice Shell</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">

    <header class="header">
      <h1>My Grid Website</h1>
    </header>

    <nav class="sidebar">
      <h2>Sidebar</h2>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Gallery</li>
        <li>Contact</li>
      </ul>
    </nav>

    <main class="main">
      <h2>Main Content</h2>
      <p>This is where your main content goes. Try resizing, moving items, and changing grid values in CSS.</p>

      <div class="card-grid">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
        <div class="card">Card 6</div>
      </div>
    </main>

    <footer class="footer">
      <p>Footer Section</p>
    </footer>

  </div>
</body>
</html>
